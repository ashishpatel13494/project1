<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Lumora Studio home"><span class="brand-mark">L</span><span>Lumora</span></a>
    <nav class="nav-links" aria-label="Main navigation"><a href="index.html">Home</a><a href="about.html">About</a><a href="gallery.html">Gallery</a><a class="active" href="contact.html">Contact</a></nav>
  </header>
  <main>
    <section class="contact-layout">
      <div class="contact-copy"><p class="eyebrow">Contact</p><h1>Tell us what you want to build.</h1><p>Share a few details and we will help shape the next step, from a fresh landing page to a full visual refresh.</p><div class="contact-details"><a href="mailto:hello@lumora.studio">hello@lumora.studio</a><a href="tel:+15550148200">+1 555 014 8200</a></div></div>
      <form class="contact-form" action="#" method="post"><label>Name<input type="text" name="name" placeholder="Your name"></label><label>Email<input type="email" name="email" placeholder="you@example.com"></label><label>Project Type<select name="project"><option>Website design</option><option>Brand refresh</option><option>Launch campaign</option><option>Something custom</option></select></label><label>Message<textarea name="message" rows="5" placeholder="A short note about your project"></textarea></label><button class="button primary" type="submit">Send Message</button></form>
    </section>
  </main>
  <footer><p>&copy; 2026 Lumora Studio. Crafted with focus.</p></footer>
</body>
